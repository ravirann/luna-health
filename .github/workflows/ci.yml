name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: web (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # DATABASE_URL is intentionally unset here. Tests that need a real
      # Postgres connection skip themselves at runtime rather than failing
      # — this job does not stand up a database service.
      - name: Unit tests (DB-dependent tests skip without DATABASE_URL)
        run: npx vitest run

      - name: Build
        run: npx next build

  server:
    name: server (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            server/requirements.txt
            server/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Tests
        run: python -m pytest -q
